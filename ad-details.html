<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليلي جيجل - تفاصيل العرض</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a; color: white; line-height: 1.6;
        }

        /* صورة العرض الديناميكية */
        .ad-banner {
            width: 100%; height: 250px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('https://via.placeholder.com/800x400'); 
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end; padding: 20px; box-sizing: border-box;
            transition: 0.5s;
        }

        .ad-title {
            background: rgba(37, 99, 235, 0.9);
            padding: 10px 20px; border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        .content-section { padding: 20px; }

        .offer-badge {
            display: inline-block; background: #ef4444; color: white;
            padding: 5px 15px; border-radius: 50px;
            font-weight: bold; font-size: 14px; margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .store-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px; padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        /* 📸 تنسيق معرض الصور الجديد */
        .image-gallery {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; margin: 20px 0;
        }
        .gallery-item {
            width: 100%; height: 140px; border-radius: 12px;
            object-fit: cover; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-buttons {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-top: 25px;
        }

        .btn {
            padding: 15px; border-radius: 12px;
            text-align: center; text-decoration: none;
            font-weight: bold; display: flex;
            align-items: center; justify-content: center; gap: 8px;
        }

        .btn-call { background: #2563eb; color: white; }
        .btn-map { background: white; color: #0f172a; }

        .back-link {
            display: block; text-align: center;
            margin-top: 30px; color: #94a3b8;
            text-decoration: none; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="ad-banner" id="adBanner">
        <div class="ad-title">
            <h2 style="margin:0" id="adMainTitle">جاري التحميل...</h2>
        </div>
    </div>

    <div class="content-section">
        <span class="offer-badge" id="adBadge">🔥 عرض خاص</span>
        
        <div class="store-info">
            <h3 id="adSubTitle">تفاصيل المحل</h3>
            <p id="adFullDesc">نحن نوفر لكم أفضل الخدمات والسلع في ولاية جيجل.</p>
            <p style="color: #3b82f6; font-weight: bold;" id="adLocation">📍 الموقع: جاري التحديد...</p>
        </div>

        <h3 id="galleryTitle" style="display:none; color:#3b82f6;">🖼️ صور من المحل:</h3>
        <div class="image-gallery" id="imageGallery"></div>

        <div class="action-buttons">
            <a href="#" id="callBtn" class="btn btn-call">📞 اتصل الآن</a>
            <a href="#" id="mapBtn" target="_blank" class="btn btn-map">📍 موقع المحل</a>
        </div>

        <a href="home.html" class="back-link">← العودة لتصفح الحرفيين</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWNO7w6izvo_QxF-yLNS9t41R9s5nTK84",
            authDomain: "dalili-jijel.firebaseapp.com",
            databaseURL: "https://dalili-jijel-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "dalili-jijel",
            storageBucket: "dalili-jijel.firebasestorage.app",
            messagingSenderId: "456094589466",
            appId: "1:456094589466:web:ae19e48570a18a99d6e7a3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const adRef = ref(db, 'ads/current');

        onValue(adRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // 1. تحديث الصورة الرئيسية والنصوص
                if (data.image) {
                    document.getElementById('adBanner').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('${data.image}')`;
                }
                document.getElementById('adMainTitle').innerText = data.title;
                document.getElementById('adSubTitle').innerText = data.title;
                document.getElementById('adFullDesc').innerText = data.description;
                
                // 2. تحديث معرض الصور إذا كان موجوداً
                const gallery = document.getElementById('imageGallery');
                gallery.innerHTML = "";
                if (data.gallery && Array.isArray(data.gallery)) {
                    document.getElementById('galleryTitle').style.display = 'block';
                    data.gallery.forEach(imgUrl => {
                        gallery.innerHTML += `<img src="${imgUrl}" class="gallery-item">`;
                    });
                }

                // 3. تحديث الروابط
                if (data.phone) {
                    document.getElementById('callBtn').href = `tel:${data.phone}`;
                    document.getElementById('callBtn').style.display = 'flex';
                } else {
                    document.getElementById('callBtn').style.display = 'none';
                }

                if (data.mapUrl) {
                    document.getElementById('mapBtn').href = data.mapUrl;
                    document.getElementById('mapBtn').style.display = 'flex';
                    document.getElementById('adLocation').innerText = "📍 الموقع: متوفر على الخريطة";
                } else {
                    document.getElementById('mapBtn').style.display = 'none';
                    document.getElementById('adLocation').innerText = "📍 الموقع: تواصل معنا للتفاصيل";
                }
            }
        });
    </script>
</body>
</html>
