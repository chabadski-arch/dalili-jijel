<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليلي جيجل - ابحث عن محترف</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a; color: white;
            padding-bottom: 50px;
        }

        .header {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(12px);
            padding: 15px 20px;
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .top-bar {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 15px;
        }

        .user-welcome { font-size: 14px; color: #3b82f6; font-weight: bold; }

        .btn-group { display: flex; gap: 8px; align-items: center; }

        .btn-profile {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6; border: 1px solid #3b82f6;
            padding: 6px 12px; border-radius: 8px;
            text-decoration: none; font-size: 13px;
            font-weight: bold; display: none; 
        }

        .btn-add-pro {
            background: #10b981; color: white;
            padding: 6px 12px; border-radius: 8px;
            text-decoration: none; font-size: 13px;
            font-weight: bold; transition: 0.3s;
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444; border: 1px solid #ef4444;
            padding: 5px 12px; border-radius: 8px;
            text-decoration: none; font-size: 13px;
        }

        .search-container { display: flex; flex-direction: column; gap: 10px; }

        .main-search {
            width: 100%; padding: 12px; border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #1e293b; color: white;
            box-sizing: border-box; outline: none; font-size: 15px;
        }

        .filter-group { display: flex; gap: 8px; }

        select {
            flex: 1; padding: 10px; border-radius: 8px;
            border: none; background: #334155;
            color: white; font-size: 13px;
        }

        .featured-ad {
            background: linear-gradient(135deg, #1e3a8a, #1e40af);
            margin: 15px; padding: 15px; border-radius: 12px;
            border: 1px solid #3b82f6; display: flex;
            align-items: center; justify-content: space-between;
            text-decoration: none; transition: 0.3s;
        }

        .pro-list { padding: 15px; display: grid; gap: 15px; }

        .pro-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 15px;
            display: flex; justify-content: space-between;
            align-items: center;
        }

        .pro-thumb {
            width: 50px; height: 50px; border-radius: 10px; 
            object-fit: cover; margin-left: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .status-badge {
            font-size: 10px; padding: 2px 8px;
            border-radius: 20px; color: white;
        }

        .btn-call {
            background: #2563eb; color: white;
            padding: 10px 18px; border-radius: 8px;
            text-decoration: none; font-weight: bold;
        }

        .join-us-card {
            margin: 20px; padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed #3b82f6; border-radius: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="top-bar">
            <div class="user-welcome" id="welcomeMsg">مرحباً بك 🌊</div>
            <div class="btn-group">
                <a href="profile.html" id="profileBtn" class="btn-profile">⚙️ بروفيلي</a>
                <a href="index.html" class="btn-logout">خروج</a>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="main-search" placeholder="ابحث بالاسم أو الحرفة (مثلاً: سباك)...">
            <div class="filter-group">
                <select id="jobFilter">
                    <option value="">كل الحرف</option>
                    <option value="سباك">سباك (Plombier)</option>
                    <option value="كهربائي">كهربائي</option>
                    <option value="بناء">بناء</option>
                </select>
                <select id="cityFilter">
                    <option value="">كل البلديات</option>
                    <option value="الميلية">الميلية</option>
                    <option value="جيجل">جيجل</option>
                    <option value="الطاهير">الطاهير</option>
                </select>
            </div>
        </div>
    </div>

    <a href="ad-details.html" id="adContainer" class="featured-ad">
        <div class="ad-text">
            <h4 id="adTitle" style="margin:0; color:#60a5fa;">جاري تحميل الإعلان...</h4>
            <p id="adDesc" style="margin:5px 0 0; font-size:12px; color: white;">تخفيضات خاصة لأهل جيجل</p>
        </div>
        <img id="adImg" src="" style="width: 40px; height: 40px; border-radius: 5px; display:none;">
    </a>

    <div class="pro-list" id="proList"></div>

    <div class="join-us-card" id="joinCard">
        <p style="margin:0 0 10px 0; font-size: 14px; color: #94a3b8;">هل أنت حرفي في ولاية جيجل؟</p>
        <a href="add-pro.html" style="color: #3b82f6; text-decoration: none; font-weight: bold;">اضغط هنا لإضافة خدماتك مجاناً 🚀</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWNO7w6izvo_QxF-yLNS9t41R9s5nTK84",
            authDomain: "dalili-jijel.firebaseapp.com",
            databaseURL: "https://dalili-jijel-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "dalili-jijel",
            storageBucket: "dalili-jijel.firebasestorage.app",
            messagingSenderId: "456094589466",
            appId: "1:456094589466:web:ae19e48570a18a99d6e7a3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const userRole = sessionStorage.getItem('userRole');
        const profileBtn = document.getElementById('profileBtn');
        const joinCard = document.getElementById('joinCard');

        if (userRole === 'pro') {
            profileBtn.style.display = 'block';
            joinCard.style.display = 'none';
        }

        const userName = sessionStorage.getItem('userName') || "زائر";
        document.getElementById('welcomeMsg').innerText = `مرحباً، ${userName} ✨`;

        onValue(ref(db, 'ads/current'), (snapshot) => {
            const ad = snapshot.val();
            if(ad) {
                document.getElementById('adTitle').innerText = ad.title;
                document.getElementById('adDesc').innerText = ad.description;
                if(ad.image) {
                    const img = document.getElementById('adImg');
                    img.src = ad.image; img.style.display = 'block';
                }
            }
        });

        // 🎯 تعديل: نظام البحث والفلترة المباشر
        let allProfessionals = [];
        onValue(ref(db, 'professionals'), (snapshot) => {
            const data = snapshot.val();
            allProfessionals = data ? Object.values(data) : [];
            filterAndDisplay();
        });

        function filterAndDisplay() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const jobFilter = document.getElementById('jobFilter').value;
            const cityFilter = document.getElementById('cityFilter').value;
            const list = document.getElementById('proList');
            
            list.innerHTML = "";
            
            const filtered = allProfessionals.filter(pro => {
                const matchesSearch = pro.name.toLowerCase().includes(searchTerm) || pro.job.toLowerCase().includes(searchTerm);
                const matchesJob = jobFilter === "" || pro.job === jobFilter;
                const matchesCity = cityFilter === "" || pro.city === cityFilter;
                return matchesSearch && matchesJob && matchesCity;
            });

            if(filtered.length > 0) {
                filtered.forEach(pro => {
                    const statusColor = pro.status === 'مشغول' ? '#ef4444' : '#10b981';
                    list.innerHTML += `
                        <div class="pro-card">
                            <div style="display:flex; align-items:center;">
                                <img src="${pro.image || 'https://via.placeholder.com/50'}" class="pro-thumb">
                                <div class="pro-info">
                                    <h3 style="margin:0; font-size:17px;">${pro.name} 
                                        <span class="status-badge" style="background:${statusColor}">${pro.status || 'متوفر'}</span>
                                    </h3>
                                    <p style="margin:5px 0; color:#94a3b8; font-size:13px;">📍 ${pro.city} | ${pro.job}</p>
                                </div>
                            </div>
                            <a href="tel:${pro.phone}" class="btn-call">اتصال</a>
                        </div>
                    `;
                });
            } else {
                list.innerHTML = "<p style='text-align:center; color:#64748b; padding:20px;'>لم يتم العثور على نتائج مطابقة.</p>";
            }
        }

        // ربط عناصر البحث بالدالة
        document.getElementById('searchInput').addEventListener('input', filterAndDisplay);
        document.getElementById('jobFilter').addEventListener('change', filterAndDisplay);
        document.getElementById('cityFilter').addEventListener('change', filterAndDisplay);

    </script>
</body>
</html>
